server:
  port: 8080

spring:
  application:
    name: exam-system
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:exam_system}?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: auto
  mapper-locations: classpath:/mapper/**/*.xml

jwt:
  secret: ${JWT_SECRET:msW7kvftK6egk0M4tumS1cx/YY3NNQCQDgLNlP2pPyTqD3uEeYf7QYOC/XWXfX+xBUqfrpYRi1UkIiiR0Ef1+Q==}
  expiration: 604800000

aes:
  secret: ${AES_SECRET:LM48/vNKyOLISngwkqDI4aSAyVT5DJ7lohtMJqWOqvpojDfkaLnE1v822rLgENp3eeuMagJCtP6voBtgBroKdQ==}

cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

logging:
  level:
    com.southcollege.exam.mapper: debug
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"

# SpringDoc 配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.southcollege.exam.controller
